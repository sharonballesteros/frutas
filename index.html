<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎 Mi Tienda de Frutas 🍌</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🍎 Mi Tienda de Frutas 🍌</h1>
    </header>

    <main class="contenedor">
        <section class="instrucciones">
            <h2>¡Bienvenido al Mercadito!</h2>
            <p>Sigue las instrucciones en las ventanas emergentes para realizar tu compra.</p>
            <p>Al terminar, verás tu resumen aquí abajo.</p>
        </section>

        <div id="resultado" style="display:none; border: 2px solid #f39c12; padding: 20px; border-radius: 12px; background-color: #fff; margin-top: 30px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            <h3 style="color: #d35400; margin-top: 0;">🛒 Resumen de tu Compra:</h3>
            <hr>
            <p id="lista-final" style="font-size: 1.2rem; font-weight: bold; color: #2c3e50;"></p>
            <p style="color: #7f8c8d;">¡Gracias por comprar con nosotros!</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 - Sharon Ballesteros | Desarrollo Web</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
